name: Upstream Sync — paperclipai/paperclip

# Checks weekly for new commits in paperclipai/paperclip (upstream).
# When found: creates a merge branch + PR for Jules (EMP-001) to review.
# EMP-000 handles locally only if CI passes and Jules approves.

on:
  schedule:
    - cron: '0 7 * * 1'  # Every Monday 07:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'Force sync even if no new commits detected'
        required: false
        default: 'false'

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout MENINX fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.email "emp-000@meninx.agency"
          git config user.name "EMP-000 Upstream Sync"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/paperclipai/paperclip.git
          git fetch upstream --tags --prune

      - name: Check for new upstream commits
        id: diff
        run: |
          # Count commits in upstream/master not yet in our master
          NEW=$(git rev-list HEAD..upstream/master --count 2>/dev/null || echo "0")
          UPSTREAM_SHA=$(git rev-parse upstream/master)
          UPSTREAM_TAG=$(git describe --tags upstream/master 2>/dev/null || echo "untagged")
          echo "new_commits=$NEW" >> "$GITHUB_OUTPUT"
          echo "upstream_sha=${UPSTREAM_SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "upstream_tag=$UPSTREAM_TAG" >> "$GITHUB_OUTPUT"
          echo "Upstream: $UPSTREAM_TAG ($UPSTREAM_SHA) — $NEW new commits vs our master"

      - name: Skip if already up-to-date
        if: steps.diff.outputs.new_commits == '0' && github.event.inputs.force != 'true'
        run: |
          echo "Already up-to-date with upstream. No PR needed."
          exit 0

      - name: Create sync branch
        if: steps.diff.outputs.new_commits != '0' || github.event.inputs.force == 'true'
        id: branch
        run: |
          DATE=$(date +%Y-%m-%d)
          TAG=$(echo "${{ steps.diff.outputs.upstream_tag }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          BRANCH="upstream-sync/${TAG}-${DATE}"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Merge upstream into sync branch
        id: merge
        run: |
          git merge upstream/master \
            --no-edit \
            -m "chore(upstream): merge paperclipai/paperclip@${{ steps.diff.outputs.upstream_sha }}

          Upstream tag: ${{ steps.diff.outputs.upstream_tag }}
          New commits: ${{ steps.diff.outputs.new_commits }}
          MENINX patches on top are preserved.

          Review: check that windowsHide patches + telemetry-off still apply cleanly." \
            || echo "MERGE_CONFLICT=true" >> "$GITHUB_ENV"

      - name: Push sync branch
        if: env.MERGE_CONFLICT != 'true'
        run: git push origin "${{ steps.branch.outputs.branch }}" --force

      - name: Create Pull Request (clean merge)
        if: env.MERGE_CONFLICT != 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GHASSEN_PAT }}
        run: |
          # Skip if PR already open for this branch
          EXISTING=$(gh pr list --repo G-B-H/paperclip --head "${{ steps.branch.outputs.branch }}" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [[ -n "$EXISTING" ]]; then
            echo "PR #$EXISTING already open for ${{ steps.branch.outputs.branch }} — skipping creation"
            echo "pr_url=https://github.com/G-B-H/paperclip/pull/$EXISTING" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          UPSTREAM_LOG=$(git log HEAD~${{ steps.diff.outputs.new_commits }}..upstream/master --oneline 2>/dev/null | head -20)
          PR_URL=$(gh pr create \
            --repo G-B-H/paperclip \
            --base master \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "upstream: sync paperclipai/paperclip → ${{ steps.diff.outputs.upstream_tag }}" \
            --body "## Upstream Sync — ${{ steps.diff.outputs.upstream_tag }}

          **New commits from upstream:** ${{ steps.diff.outputs.new_commits }}
          **Upstream SHA:** \`${{ steps.diff.outputs.upstream_sha }}\`

          ### What changed upstream
          \`\`\`
          ${UPSTREAM_LOG}
          \`\`\`

          ### MENINX patches to verify still apply
          - \`fix(embedded-postgres)\`: windowsHide:true on both spawn calls
          - \`docs(meninx)\`: telemetry disabled (no data to paperclip.ing)
          - \`docs(meninx)\`: bun:sqlite deferred analysis

          ### Review checklist
          - [ ] Merge conflict-free ✅
          - [ ] windowsHide patch still present in embedded-postgres dist/
          - [ ] Telemetry still disabled
          - [ ] paperclip-hq starts cleanly after \`pnpm install\`
          - [ ] No new visible windows on Windows

          ---
          _Auto-generated by EMP-000 Upstream Sync · Assign to EMP-001 Jules for DevOps review_")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "Created PR: $PR_URL"

      - name: Create conflict PR (needs manual resolution)
        if: env.MERGE_CONFLICT == 'true'
        id: pr_conflict
        env:
          GH_TOKEN: ${{ secrets.GHASSEN_PAT }}
        run: |
          # Push branch with conflict markers for manual resolution
          git add -A && git commit -m "chore(upstream): sync attempt — CONFLICTS need resolution" || true
          git push origin "${{ steps.branch.outputs.branch }}" --force || true
          PR_URL=$(gh pr create \
            --repo G-B-H/paperclip \
            --base master \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "upstream: CONFLICTS — sync paperclipai/paperclip → ${{ steps.diff.outputs.upstream_tag }}" \
            --body "## ⚠️ Upstream Sync — MERGE CONFLICTS

          Upstream has ${{ steps.diff.outputs.new_commits }} new commits but they conflict with our MENINX patches.

          **Action required:** Manually resolve conflicts in this branch, then push.

          Likely conflict areas:
          - \`packages/app/src/\` (embedded-postgres windowsHide patch)
          - Any file modified both upstream and in our 5 MENINX commits

          ---
          _Auto-generated by EMP-000 Upstream Sync_" \
            --label "upstream-conflict") || true
          echo "Conflict PR created: $PR_URL"

      - name: Discord notification
        if: always() && env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_DEV_UPDATES }}
        run: |
          if [[ "${{ steps.diff.outputs.new_commits }}" == "0" && "${{ github.event.inputs.force }}" != "true" ]]; then
            MSG="✅ **Paperclip upstream** — already up-to-date with \`${{ steps.diff.outputs.upstream_tag }}\`"
          elif [[ "$MERGE_CONFLICT" == "true" ]]; then
            MSG="⚠️ **Paperclip upstream sync** — ${{ steps.diff.outputs.new_commits }} new commits, **CONFLICTS** detected. Manual resolution needed."
          else
            MSG="🔄 **Paperclip upstream sync** — ${{ steps.diff.outputs.new_commits }} new commits merged from \`${{ steps.diff.outputs.upstream_tag }}\`. PR created for Jules review."
          fi
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"$MSG\"}" || true
